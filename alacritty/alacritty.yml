  # decorations: buttonless
  # decorations: full
  dimensions:
    columns: 107
    lines: 29
    # columns: 132
    # lines: 24
# tabspaces: 2
# draw_bold_text_with_bright_colors: false
font:
  normal:
    family: Jetbrains Mono NL
    # family: IBM Plex Mono
    # family: Monoid
    # family: Space Mono
    # family: Ubuntu Mono
    # family: Terminus (TTF)
    # family: Unifont
    # family: Courier New
    # family: Courier Prime Code
    # family: Writer
    # family: Menlo
    # family: FiraMono Nerd Font
    # family: RobotoMono Nerd Font
    # family: SauceCodePro Nerd Font
    # family: InconsolataGo Nerd Font
    style: Regular
    # style: Medium
  #   bold:
