  #     style: Regular
  #   italic:
  #     family: Jetbrains Mono NL
  #     style: Regular
  #   bold_italic:
  #     family: Jetbrains Mono NL
  #     style: Regular
  size: 12.5
  offset:
    y: 0
    x: 0
  glyph_offset:
    x: 0
    y: 0
