scrolling:
  history: 100000
  auto_scroll: true
live_config_reload: true
# draw_bold_text_with_bright_colors: false
draw_bold_text_with_bright_colors: true
schemes:
  default: &default
    primary:
      # background: '#000000' # black
      # background: '#131313' # dark gray
      # background: "#161616" # midligt gray
      # background: '#0D0B01' # prime
      background: "#262626"  # light gray
      foreground: "#c7c7c7"
    normal:
      black: "#000000"
      red: "#c91b00"
      green: "#00c200"
      yellow: "#a2734c"
      blue: "#0000ee"
      magenta: "#c930c7"
      cyan: "#00c5c7"
      # white:      '#xc7c7c7'
      white: "#999999"
    bright:
      black: "#676767"
      red: "#ff6d67"
      green: "#5ff967"
      yellow: "#e9ad0c"
      # yellow:     '#F8D648'
      # yellow:     "#f7cd94"
      blue: "#5555ff"
      magenta: "#ff76ff"
